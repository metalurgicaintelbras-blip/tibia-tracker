<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diário de Aventuras — Tibia Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#14130F; --bg-2:#1E1B14; --bg-3:#262017;
    --parch:#E7DBBE; --parch-2:#D8C79C; --parch-line:#C9B27E;
    --ink:#2A2118; --ink-soft:#6A5538;
    --wood:#3A2A1A; --wood-line:#5A4226;
    --gold:#D9A736; --gold-bright:#F2C44E; --gold-deep:#A6791F;
    --green:#6E9244; --green-deep:#4C6A2C;
    --red:#B3402A; --cyan:#7FC9D6;
    --shadow:0 18px 40px -12px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 90% at 50% -10%, #20251A 0%, var(--bg) 55%, #0C0B08 100%);
    color:var(--parch);
    font-family:"Spectral",Georgia,serif;
    -webkit-font-smoothing:antialiased;
    min-height:100%;
    overflow-x:hidden;
  }
  h1,h2,h3,.display{font-family:"Cinzel",serif;letter-spacing:.02em}
  .mono{font-family:"JetBrains Mono",monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit}
  .hidden{display:none !important}

  /* ============ MAP VIEW ============ */
  #view-map{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;padding:14px;
  }
  .map-title{
    text-align:center;animation:dropIn .7s ease both;
  }
  .map-title .eyebrow{
    font-size:.72rem;letter-spacing:.42em;text-transform:uppercase;
    color:var(--gold);opacity:.8;margin-bottom:6px;
  }
  .map-title h1{
    font-size:clamp(1.3rem,3.4vw,2.3rem);font-weight:700;
    color:var(--parch);
    text-shadow:0 2px 0 #000,0 0 22px rgba(217,167,54,.25);
  }
  .map-frame{
    position:relative;
    width:min(96vw, calc((100vh - 130px) * (1408/768)));
    aspect-ratio:1408/768;
    border:3px solid var(--wood-line);
    border-radius:10px;
    box-shadow:var(--shadow), inset 0 0 0 2px rgba(0,0,0,.5);
    overflow:hidden;
    animation:frameIn .9s cubic-bezier(.2,.7,.2,1) both;
  }
  .map-frame img{width:100%;height:100%;display:block;object-fit:cover;user-select:none}
  /* darkening vignette so labels read */
  .map-frame::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 120px 10px rgba(0,0,0,.45);
  }

  .hotspot{
    position:absolute;border:none;background:transparent;
    border-radius:14px;transition:box-shadow .18s, background .18s;
  }
  .hotspot:hover,.hotspot:focus-visible{
    background:radial-gradient(ellipse at center, rgba(242,196,78,.20), rgba(242,196,78,0) 70%);
    box-shadow:inset 0 0 0 2px rgba(242,196,78,.55), 0 0 26px rgba(242,196,78,.35);
    outline:none;
  }
  /* discoverable beacon at center of each hotspot */
  .beacon{
    position:absolute;left:50%;top:50%;width:18px;height:18px;
    transform:translate(-50%,-50%);border-radius:50%;
    background:var(--gold-bright);
    box-shadow:0 0 0 4px rgba(242,196,78,.25), 0 0 14px 3px var(--gold);
    animation:pulse 2.1s ease-in-out infinite;pointer-events:none;
  }
  .hotspot .label{
    position:absolute;left:50%;bottom:calc(50% + 22px);transform:translate(-50%,6px);
    background:linear-gradient(180deg,var(--parch),var(--parch-2));
    color:var(--ink);font-family:"Cinzel",serif;font-weight:600;
    font-size:.82rem;letter-spacing:.04em;white-space:nowrap;
    padding:5px 12px;border-radius:6px;border:1.5px solid var(--gold-deep);
    box-shadow:0 6px 14px rgba(0,0,0,.5);
    opacity:0;transition:opacity .18s, transform .18s;pointer-events:none;
  }
  .hotspot .label::after{
    content:"";position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);
    border:6px solid transparent;border-top-color:var(--parch-2);border-bottom:none;
  }
  .hotspot:hover .label,.hotspot:focus-visible .label{opacity:1;transform:translate(-50%,0)}

  .map-hint{
    font-size:.82rem;color:var(--parch-2);opacity:.7;letter-spacing:.05em;
    animation:dropIn 1.1s ease both;
  }
  .map-hint b{color:var(--gold);font-weight:600}

  /* ============ APP SHELL (interior pages) ============ */
  #shell{min-height:100vh;display:none;flex-direction:column}
  #shell.active{display:flex}
  .topbar{
    position:sticky;top:0;z-index:20;
    display:flex;align-items:center;gap:16px;
    padding:14px clamp(16px,4vw,40px);
    background:linear-gradient(180deg,#241B11,#1A140C);
    border-bottom:2px solid var(--wood-line);
    box-shadow:0 8px 20px -10px rgba(0,0,0,.8);
  }
  .back-btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:9px 16px;border-radius:8px;
    border:1.5px solid var(--wood-line);
    background:linear-gradient(180deg,#33271A,#241B11);
    color:var(--parch);font-family:"Cinzel",serif;font-size:.82rem;font-weight:500;
    transition:border-color .15s, transform .1s;
  }
  .back-btn:hover{border-color:var(--gold);transform:translateY(-1px)}
  .topbar .crest{font-size:1.1rem}
  .topbar h2{font-size:clamp(1rem,2.4vw,1.4rem);color:var(--gold-bright);font-weight:600}
  .topbar .spacer{flex:1}
  .nav-pills{display:flex;gap:6px;flex-wrap:wrap}
  .nav-pills a{
    padding:7px 13px;border-radius:7px;font-size:.78rem;font-family:"Cinzel",serif;
    color:var(--parch-2);border:1px solid transparent;transition:.15s;text-decoration:none;
  }
  .nav-pills a:hover{color:var(--parch);border-color:var(--wood-line)}
  .nav-pills a.on{background:rgba(217,167,54,.14);color:var(--gold-bright);border-color:var(--gold-deep)}

  .page{flex:1;width:100%;max-width:1080px;margin:0 auto;padding:clamp(20px,4vw,40px)}
  .page-head{margin-bottom:22px}
  .page-head .kicker{font-size:.72rem;letter-spacing:.36em;text-transform:uppercase;color:var(--gold);opacity:.85}
  .page-head h1{font-size:clamp(1.5rem,4vw,2.2rem);margin-top:6px;color:var(--parch)}
  .page-head p{color:var(--parch-2);opacity:.85;margin-top:6px;max-width:60ch}

  /* parchment card */
  .card{
    background:linear-gradient(170deg,var(--parch),var(--parch-2));
    color:var(--ink);border-radius:12px;
    border:2px solid var(--gold-deep);
    box-shadow:var(--shadow);
    position:relative;
  }
  .card::before{
    content:"";position:absolute;inset:6px;border:1px solid rgba(106,85,56,.35);
    border-radius:7px;pointer-events:none;
  }
  .card-pad{padding:clamp(16px,3vw,26px)}

  /* forms */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  label.fld{display:flex;flex-direction:column;gap:5px;font-size:.74rem;font-weight:600;
    letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft)}
  input,select,textarea{
    font-family:"Spectral",serif;font-size:.95rem;color:var(--ink);
    background:#FBF5E4;border:1.5px solid #B49A6B;border-radius:7px;padding:9px 11px;
    transition:border-color .15s, box-shadow .15s;width:100%;
  }
  textarea{resize:vertical;min-height:60px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-deep);
    box-shadow:0 0 0 3px rgba(217,167,54,.25)}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    padding:10px 18px;border-radius:8px;font-family:"Cinzel",serif;font-weight:600;
    font-size:.85rem;letter-spacing:.02em;transition:transform .1s, filter .15s;
  }
  .btn:hover{transform:translateY(-1px);filter:brightness(1.06)}
  .btn:active{transform:translateY(0)}
  .btn-gold{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#3a2a0a;
    box-shadow:0 4px 0 var(--gold-deep)}
  .btn-wood{background:linear-gradient(180deg,#3a2c1c,#2a2014);color:var(--parch);
    border:1.5px solid var(--wood-line)}
  .btn-ghost{background:transparent;border:1.5px solid #B49A6B;color:var(--ink)}
  .btn-sm{padding:6px 11px;font-size:.74rem;border-radius:6px}
  .btn-danger{color:var(--red);border:1.5px solid rgba(179,64,42,.5);background:rgba(179,64,42,.06)}
  .btn-danger:hover{background:rgba(179,64,42,.14)}

  .row-actions{display:flex;gap:8px;flex-wrap:wrap}

  /* lists */
  .stack{display:flex;flex-direction:column;gap:14px;margin-top:22px}
  .item{
    display:flex;gap:16px;align-items:flex-start;
    background:linear-gradient(170deg,#FBF5E4,#EFE3C4);
    border:1.5px solid #C9B27E;border-left:5px solid var(--gold);
    border-radius:10px;padding:14px 16px;color:var(--ink);
    box-shadow:0 6px 16px -10px rgba(0,0,0,.5);
  }
  .item .grow{flex:1;min-width:0}
  .item h3{font-size:1.05rem;color:var(--ink);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .item .meta{font-size:.85rem;color:var(--ink-soft);margin-top:4px}
  .item .meta b{color:var(--ink);font-weight:600}
  .item .notes{font-size:.88rem;margin-top:8px;font-style:italic;color:#5a4a32}

  .badge{font-family:"JetBrains Mono",monospace;font-size:.68rem;font-weight:700;
    padding:3px 8px;border-radius:5px;letter-spacing:.04em;white-space:nowrap}
  .voc-knight{background:#7a2b1e;color:#ffd9c9}
  .voc-paladin{background:#2c5a3a;color:#cdf3d8}
  .voc-sorcerer{background:#5a2c6a;color:#ecd2f7}
  .voc-druid{background:#2c4a6a;color:#cfe4f7}
  .voc-monk{background:#6a5a1e;color:#f7ecc2}
  .voc-none{background:#4a4032;color:#e7dbbe}

  .st-todo{background:#52473a;color:#e2d6bb}
  .st-doing{background:#7a5a1c;color:#ffe6a8}
  .st-done{background:#3a5a28;color:#d4f0bb}

  /* gold balance hero */
  .vault{
    display:flex;flex-wrap:wrap;gap:24px;align-items:center;justify-content:space-between;
  }
  .vault .total{font-family:"JetBrains Mono",monospace;font-weight:700;
    font-size:clamp(1.8rem,6vw,3rem);color:#3a2a0a;line-height:1}
  .vault .total small{font-size:.42em;color:var(--ink-soft);font-weight:700}
  .coins{display:flex;gap:14px;flex-wrap:wrap}
  .coin{display:flex;flex-direction:column;align-items:center;gap:3px;
    background:rgba(58,42,10,.06);border:1px solid #C9B27E;border-radius:9px;padding:10px 16px;min-width:84px}
  .coin .v{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:1.1rem;color:#3a2a0a}
  .coin .l{font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft)}
  .coin.cc .v{color:#7a2b6a}.coin.pp .v{color:#4a6a7a}.coin.gp .v{color:#a6791f}

  .ledger .amt{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:1rem}
  .amt.pos{color:var(--green-deep)} .amt.neg{color:var(--red)}

  /* overview stats */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
  .stat{background:linear-gradient(170deg,#FBF5E4,#EADCB8);border:1.5px solid #C9B27E;
    border-radius:11px;padding:18px 20px;color:var(--ink)}
  .stat .n{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:1.9rem;color:#3a2a0a;line-height:1}
  .stat .t{font-size:.78rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft);margin-top:8px}
  .stat .sub{font-size:.82rem;color:#5a4a32;margin-top:4px}

  .empty{text-align:center;color:#6a5538;padding:30px 16px;font-style:italic}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
  .seg{display:flex;gap:4px;background:rgba(58,42,10,.08);padding:4px;border-radius:8px}
  .seg button{padding:6px 12px;border-radius:6px;font-size:.78rem;font-family:"Cinzel",serif;color:var(--ink-soft)}
  .seg button.on{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#3a2a0a}

  /* animations */
  @keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}
    50%{transform:translate(-50%,-50%) scale(1.35);opacity:.65}}
  @keyframes dropIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
  @keyframes frameIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
  @media (max-width:560px){
    .nav-pills{display:none}
    .map-title h1{font-size:1.25rem}
    .item{flex-direction:column}
  }
</style>
</head>

<script>
/* ============================================================
   Camada de dados — usa localStorage, com fallback em memória
   (para que o preview não quebre caso o storage esteja bloqueado)
============================================================ */
const MEM = {};
const store = {
  read(key, def){
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
    catch(e){ return (key in MEM) ? MEM[key] : def; }
  },
  write(key, val){
    MEM[key] = val;
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){}
  }
};
const K = { chars:'tibia.chars', gold:'tibia.gold', obj:'tibia.obj' };
const uid = () => Math.random().toString(36).slice(2,9);
const nf = n => Number(n||0).toLocaleString('pt-BR');

const VOCS = {
  knight:'Knight', paladin:'Paladin', sorcerer:'Sorcerer', druid:'Druid', monk:'Monk', none:'—'
};
const VOC_TAG = { knight:'EK', paladin:'RP', sorcerer:'MS', druid:'ED', monk:'EM', none:'—' };

let editingChar = null, editingObj = null;

/* ===================== Estado helpers ===================== */
const getChars = () => store.read(K.chars, []);
const getGold  = () => store.read(K.gold, []);   // [{id,ts,amount(gp signed),note,charId}]
const getObj   = () => store.read(K.obj, []);
const goldBalance = () => getGold().reduce((s,t)=>s+Number(t.amount||0),0);
const charName = id => (getChars().find(c=>c.id===id)||{}).name || '';

/* ============================================================
   Roteamento por hash
============================================================ */
const ROUTES = ['overview','characters','gold','objectives'];
const TITLES = { overview:['⚑','Visão geral'], characters:['⚔','Personagens'],
                 gold:['💰','Tesouro & Gold'], objectives:['🐉','Objetivos'] };

function go(dest){
  if(dest==='map'){ location.hash=''; return; }
  location.hash = dest;
}
function router(){
  const hash = location.hash.replace('#','');
  const mapView = document.getElementById('view-map');
  const shell = document.getElementById('shell');
  if(!ROUTES.includes(hash)){
    shell.classList.remove('active'); mapView.style.display='flex';
    return;
  }
  mapView.style.display='none'; shell.classList.add('active');
  const [crest,title] = TITLES[hash];
  document.getElementById('shell-crest').textContent = crest;
  document.getElementById('shell-title').textContent = title;
  document.querySelectorAll('[data-pill]').forEach(a=>a.classList.toggle('on', a.dataset.pill===hash));
  editingChar=null; editingObj=null;
  RENDER[hash]();
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', router);
document.addEventListener('click', e=>{
  const t = e.target.closest('[data-go]');
  if(t){ go(t.dataset.go); }
});

/* ============================================================
   Renderizadores de cada página
============================================================ */
const page = () => document.getElementById('page');
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const RENDER = {};

/* ---------- VISÃO GERAL ---------- */
RENDER.overview = function(){
  const chars=getChars(), obj=getObj(), bal=goldBalance();
  const top = chars.slice().sort((a,b)=>(b.level||0)-(a.level||0))[0];
  const done = obj.filter(o=>o.status==='done').length;
  const doing = obj.filter(o=>o.status==='doing').length;
  page().innerHTML = `
    <div class="page-head">
      <div class="kicker">Castelo Real</div>
      <h1>Visão geral</h1>
      <p>Um resumo do seu reino: personagens, cofre e objetivos num relance.</p>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="n">${chars.length}</div><div class="t">Personagens</div>
        <div class="sub">${top?`Maior nível: ${esc(top.name)} (${top.level||0})`:'Nenhum criado ainda'}</div></div>
      <div class="stat"><div class="n mono">${nf(bal)}</div><div class="t">Gold (gp)</div>
        <div class="sub">${nf(Math.floor(bal/100))} pp · ${nf(Math.floor(bal/10000))} cc</div></div>
      <div class="stat"><div class="n">${obj.length}</div><div class="t">Objetivos</div>
        <div class="sub">${done} concluídos · ${doing} em andamento</div></div>
      <div class="stat"><div class="n">${obj.length?Math.round(done/obj.length*100):0}%</div><div class="t">Progresso</div>
        <div class="sub">das metas concluídas</div></div>
    </div>
    <div class="stack">
      ${chars.length===0 && obj.length===0 ? `<div class="card card-pad empty">
        Seu reino está só começando. Clique no <b>Mapa</b> e escolha uma área, ou use as abas acima para adicionar personagens, registrar gold e definir objetivos.
      </div>`:''}
      ${doing>0?`<div class="card card-pad"><h3 style="font-family:Cinzel;color:#3a2a0a;margin-bottom:10px">Em andamento agora</h3>
        ${obj.filter(o=>o.status==='doing').map(o=>`<div class="item" style="border-left-color:var(--gold)">
          <div class="grow"><h3>${esc(o.title)} <span class="badge st-doing">EM ANDAMENTO</span></h3>
          ${o.charId?`<div class="meta">Personagem: <b>${esc(charName(o.charId))}</b></div>`:''}
          ${o.desc?`<div class="notes">${esc(o.desc)}</div>`:''}</div></div>`).join('')}
      </div>`:''}
    </div>`;
};

/* ---------- PERSONAGENS ---------- */
RENDER.characters = function(){
  const chars = getChars();
  const e = editingChar || {};
  page().innerHTML = `
    <div class="page-head">
      <div class="kicker">Salão dos Heróis</div>
      <h1>Personagens</h1>
      <p>Cadastre seus chars, acompanhe nível e vocação.</p>
    </div>
    <div class="card card-pad">
      <div class="form-grid">
        <label class="fld" style="grid-column:span 2">Nome
          <input id="c-name" value="${esc(e.name||'')}" placeholder="Ex.: Sir Aric" /></label>
        <label class="fld">Vocação
          <select id="c-voc">${Object.entries(VOCS).map(([k,v])=>
            `<option value="${k}" ${e.voc===k?'selected':''}>${v}</option>`).join('')}</select></label>
        <label class="fld">Nível
          <input id="c-level" type="number" min="1" value="${e.level||1}" /></label>
        <label class="fld">Mundo
          <input id="c-world" value="${esc(e.world||'')}" placeholder="Ex.: Antica" /></label>
        <label class="fld" style="grid-column:1/-1">Notas
          <textarea id="c-notes" placeholder="Equipamentos, metas pessoais...">${esc(e.notes||'')}</textarea></label>
      </div>
      <div class="row-actions" style="margin-top:14px">
        <button class="btn btn-gold" onclick="saveChar()">${editingChar?'Salvar alterações':'Adicionar personagem'}</button>
        ${editingChar?`<button class="btn btn-ghost" onclick="editingChar=null;RENDER.characters()">Cancelar</button>`:''}
      </div>
    </div>
    <div class="stack">
      ${chars.length===0?`<div class="card card-pad empty">Nenhum personagem ainda. Adicione o primeiro acima.</div>`:''}
      ${chars.slice().sort((a,b)=>(b.level||0)-(a.level||0)).map(c=>`
        <div class="item">
          <div class="grow">
            <h3>${esc(c.name)} <span class="badge voc-${c.voc||'none'}">${VOC_TAG[c.voc||'none']}</span></h3>
            <div class="meta">Nível <b>${c.level||0}</b> · ${VOCS[c.voc||'none']}${c.world?` · <b>${esc(c.world)}</b>`:''}</div>
            ${c.notes?`<div class="notes">${esc(c.notes)}</div>`:''}
          </div>
          <div class="row-actions">
            <button class="btn btn-wood btn-sm" onclick="levelChar('${c.id}',1)">+1 nv</button>
            <button class="btn btn-ghost btn-sm" onclick="startEditChar('${c.id}')">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="delChar('${c.id}')">Excluir</button>
          </div>
        </div>`).join('')}
    </div>`;
};
function saveChar(){
  const name=document.getElementById('c-name').value.trim();
  if(!name){ document.getElementById('c-name').focus(); return; }
  const data={ name,
    voc:document.getElementById('c-voc').value,
    level:Math.max(1,parseInt(document.getElementById('c-level').value)||1),
    world:document.getElementById('c-world').value.trim(),
    notes:document.getElementById('c-notes').value.trim() };
  const list=getChars();
  if(editingChar){ Object.assign(editingChar,data); }
  else { list.push({id:uid(),...data}); }
  store.write(K.chars, editingChar?list:list);
  editingChar=null; RENDER.characters();
}
function startEditChar(id){ editingChar=getChars().find(c=>c.id===id); RENDER.characters(); }
function levelChar(id,d){ const l=getChars(); const c=l.find(x=>x.id===id); if(c){c.level=(c.level||0)+d; store.write(K.chars,l); RENDER.characters();} }
function delChar(id){ if(!confirm('Excluir este personagem?'))return; store.write(K.chars,getChars().filter(c=>c.id!==id)); RENDER.characters(); }

/* ---------- GOLD ---------- */
RENDER.gold = function(){
  const bal=goldBalance(), tx=getGold().slice().sort((a,b)=>b.ts-a.ts);
  const chars=getChars();
  page().innerHTML = `
    <div class="page-head">
      <div class="kicker">Câmara do Tesouro</div>
      <h1>Tesouro & Gold</h1>
      <p>Registre o que entra e sai. O saldo converte automaticamente em platinum e crystal.</p>
    </div>
    <div class="card card-pad" style="margin-bottom:18px">
      <div class="vault">
        <div><div class="total mono">${nf(bal)} <small>gp</small></div></div>
        <div class="coins">
          <div class="coin cc"><span class="v">${nf(Math.floor(bal/10000))}</span><span class="l">Crystal</span></div>
          <div class="coin pp"><span class="v">${nf(Math.floor((bal%10000)/100))}</span><span class="l">Platinum</span></div>
          <div class="coin gp"><span class="v">${nf(bal%100)}</span><span class="l">Gold</span></div>
        </div>
      </div>
    </div>
    <div class="card card-pad">
      <div class="form-grid">
        <label class="fld">Quantia
          <input id="g-amt" type="number" min="0" step="1" placeholder="0" /></label>
        <label class="fld">Unidade
          <select id="g-unit"><option value="1">gold (gp)</option><option value="100">platinum (pp)</option><option value="10000">crystal (cc)</option></select></label>
        <label class="fld">Personagem
          <select id="g-char"><option value="">— geral —</option>${chars.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select></label>
        <label class="fld" style="grid-column:1/-1">Descrição
          <input id="g-note" placeholder="Ex.: venda de loot, taxa de respawn..." /></label>
      </div>
      <div class="row-actions" style="margin-top:14px">
        <button class="btn btn-gold" onclick="addGold(1)">＋ Entrada</button>
        <button class="btn btn-wood" onclick="addGold(-1)">－ Saída</button>
      </div>
    </div>
    <div class="stack ledger">
      ${tx.length===0?`<div class="card card-pad empty">Nenhuma movimentação registrada ainda.</div>`:''}
      ${tx.map(t=>`<div class="item" style="border-left-color:${t.amount>=0?'var(--green)':'var(--red)'}">
        <div class="grow">
          <h3>${t.note?esc(t.note):(t.amount>=0?'Entrada':'Saída')}</h3>
          <div class="meta">${new Date(t.ts).toLocaleDateString('pt-BR')}${t.charId?` · <b>${esc(charName(t.charId))}</b>`:''}</div>
        </div>
        <div style="text-align:right">
          <div class="amt ${t.amount>=0?'pos':'neg'}">${t.amount>=0?'+':'−'}${nf(Math.abs(t.amount))} gp</div>
          <button class="btn btn-danger btn-sm" style="margin-top:6px" onclick="delGold('${t.id}')">Remover</button>
        </div>
      </div>`).join('')}
    </div>`;
};
function addGold(sign){
  const raw=parseInt(document.getElementById('g-amt').value)||0;
  if(raw<=0){ document.getElementById('g-amt').focus(); return; }
  const unit=parseInt(document.getElementById('g-unit').value);
  const amount=sign*raw*unit;
  const list=getGold();
  list.push({id:uid(),ts:Date.now(),amount,
    note:document.getElementById('g-note').value.trim(),
    charId:document.getElementById('g-char').value});
  store.write(K.gold,list); RENDER.gold();
}
function delGold(id){ store.write(K.gold,getGold().filter(t=>t.id!==id)); RENDER.gold(); }

/* ---------- OBJETIVOS ---------- */
let objFilter='all';
RENDER.objectives = function(){
  const all=getObj(), chars=getChars();
  const list = objFilter==='all'?all:all.filter(o=>o.status===objFilter);
  const e=editingObj||{};
  const order={doing:0,todo:1,done:2};
  page().innerHTML = `
    <div class="page-head">
      <div class="kicker">Caçada do Dragão</div>
      <h1>Objetivos</h1>
      <p>Defina metas — subir de nível, conseguir um item, juntar gold — e acompanhe o status.</p>
    </div>
    <div class="card card-pad">
      <div class="form-grid">
        <label class="fld" style="grid-column:1/-1">Objetivo
          <input id="o-title" value="${esc(e.title||'')}" placeholder="Ex.: Conseguir a Dragon Scale Mail" /></label>
        <label class="fld">Personagem
          <select id="o-char"><option value="">— qualquer —</option>${chars.map(c=>`<option value="${c.id}" ${e.charId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></label>
        <label class="fld">Status
          <select id="o-status">
            <option value="todo" ${e.status==='todo'?'selected':''}>Não iniciado</option>
            <option value="doing" ${e.status==='doing'?'selected':''}>Em andamento</option>
            <option value="done" ${e.status==='done'?'selected':''}>Concluído</option>
          </select></label>
        <label class="fld" style="grid-column:1/-1">Detalhes
          <textarea id="o-desc" placeholder="Como pretende alcançar?">${esc(e.desc||'')}</textarea></label>
      </div>
      <div class="row-actions" style="margin-top:14px">
        <button class="btn btn-gold" onclick="saveObj()">${editingObj?'Salvar alterações':'Adicionar objetivo'}</button>
        ${editingObj?`<button class="btn btn-ghost" onclick="editingObj=null;RENDER.objectives()">Cancelar</button>`:''}
      </div>
    </div>
    <div class="toolbar" style="margin-top:22px">
      <div class="seg">
        ${[['all','Todos'],['todo','Não iniciados'],['doing','Em andamento'],['done','Concluídos']].map(([k,l])=>
          `<button class="${objFilter===k?'on':''}" onclick="objFilter='${k}';RENDER.objectives()">${l}</button>`).join('')}
      </div>
    </div>
    <div class="stack">
      ${list.length===0?`<div class="card card-pad empty">Nenhum objetivo aqui. Que tal definir o próximo desafio?</div>`:''}
      ${list.slice().sort((a,b)=>order[a.status]-order[b.status]).map(o=>{
        const lbl={todo:['st-todo','NÃO INICIADO'],doing:['st-doing','EM ANDAMENTO'],done:['st-done','CONCLUÍDO']}[o.status];
        return `<div class="item" style="border-left-color:${o.status==='done'?'var(--green)':o.status==='doing'?'var(--gold)':'#9a8a6a'}">
          <div class="grow">
            <h3>${esc(o.title)} <span class="badge ${lbl[0]}">${lbl[1]}</span></h3>
            ${o.charId?`<div class="meta">Personagem: <b>${esc(charName(o.charId))}</b></div>`:''}
            ${o.desc?`<div class="notes">${esc(o.desc)}</div>`:''}
          </div>
          <div class="row-actions">
            <button class="btn btn-wood btn-sm" onclick="cycleObj('${o.id}')">Avançar status</button>
            <button class="btn btn-ghost btn-sm" onclick="startEditObj('${o.id}')">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="delObj('${o.id}')">Excluir</button>
          </div>
        </div>`;}).join('')}
    </div>`;
};
function saveObj(){
  const title=document.getElementById('o-title').value.trim();
  if(!title){ document.getElementById('o-title').focus(); return; }
  const data={ title,
    charId:document.getElementById('o-char').value,
    status:document.getElementById('o-status').value,
    desc:document.getElementById('o-desc').value.trim() };
  const list=getObj();
  if(editingObj){ Object.assign(editingObj,data); }
  else { list.push({id:uid(),ts:Date.now(),...data}); }
  store.write(K.obj,list); editingObj=null; RENDER.objectives();
}
function startEditObj(id){ editingObj=getObj().find(o=>o.id===id); RENDER.objectives(); }
function cycleObj(id){ const l=getObj(); const o=l.find(x=>x.id===id);
  const nx={todo:'doing',doing:'done',done:'todo'}; o.status=nx[o.status]; store.write(K.obj,l); RENDER.objectives(); }
function delObj(id){ if(!confirm('Excluir este objetivo?'))return; store.write(K.obj,getObj().filter(o=>o.id!==id)); RENDER.objectives(); }

/* iniciar */
router();
</script>
</body>
</html>
