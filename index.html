<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diário de Aventuras — Tibia Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#14130F; --bg-2:#1E1B14; --bg-3:#262017;
    --parch:#E7DBBE; --parch-2:#D8C79C; --parch-line:#C9B27E;
    --ink:#2A2118; --ink-soft:#6A5538;
    --wood:#3A2A1A; --wood-line:#5A4226;
    --gold:#D9A736; --gold-bright:#F2C44E; --gold-deep:#A6791F;
    --green:#6E9244; --green-deep:#4C6A2C;
    --red:#B3402A; --cyan:#7FC9D6;
    --shadow:0 18px 40px -12px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 90% at 50% -10%, #20251A 0%, var(--bg) 55%, #0C0B08 100%);
    color:var(--parch);
    font-family:"Spectral",Georgia,serif;
    -webkit-font-smoothing:antialiased;
    min-height:100%;
    overflow-x:hidden;
  }
  h1,h2,h3,.display{font-family:"Cinzel",serif;letter-spacing:.02em}
  .mono{font-family:"JetBrains Mono",monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit}
  .hidden{display:none !important}

  /* ============ MAP VIEW ============ */
  #view-map{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;padding:14px;
  }
  .map-title{
    text-align:center;animation:dropIn .7s ease both;
  }
  .map-title .eyebrow{
    font-size:.72rem;letter-spacing:.42em;text-transform:uppercase;
    color:var(--gold);opacity:.8;margin-bottom:6px;
  }
  .map-title h1{
    font-size:clamp(1.3rem,3.4vw,2.3rem);font-weight:700;
    color:var(--parch);
    text-shadow:0 2px 0 #000,0 0 22px rgba(217,167,54,.25);
  }
  .map-frame{
    position:relative;
    width:min(96vw, calc((100vh - 130px) * (1408/768)));
    aspect-ratio:1408/768;
    border:3px solid var(--wood-line);
    border-radius:10px;
    box-shadow:var(--shadow), inset 0 0 0 2px rgba(0,0,0,.5);
    overflow:hidden;
    animation:frameIn .9s cubic-bezier(.2,.7,.2,1) both;
  }
  .map-frame img{width:100%;height:100%;display:block;object-fit:cover;user-select:none}
  /* darkening vignette so labels read */
  .map-frame::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 120px 10px rgba(0,0,0,.45);
  }

  .hotspot{
    position:absolute;border:none;background:transparent;
    border-radius:14px;transition:box-shadow .18s, background .18s;
  }
  .hotspot:hover,.hotspot:focus-visible{
    background:radial-gradient(ellipse at center, rgba(242,196,78,.20), rgba(242,196,78,0) 70%);
    box-shadow:inset 0 0 0 2px rgba(242,196,78,.55), 0 0 26px rgba(242,196,78,.35);
    outline:none;
  }
  /* discoverable beacon at center of each hotspot */
  .beacon{
    position:absolute;left:50%;top:50%;width:18px;height:18px;
    transform:translate(-50%,-50%);border-radius:50%;
    background:var(--gold-bright);
    box-shadow:0 0 0 4px rgba(242,196,78,.25), 0 0 14px 3px var(--gold);
    animation:pulse 2.1s ease-in-out infinite;pointer-events:none;
  }
  .hotspot .label{
    position:absolute;left:50%;bottom:calc(50% + 22px);transform:translate(-50%,6px);
    background:linear-gradient(180deg,var(--parch),var(--parch-2));
    color:var(--ink);font-family:"Cinzel",serif;font-weight:600;
    font-size:.82rem;letter-spacing:.04em;white-space:nowrap;
    padding:5px 12px;border-radius:6px;border:1.5px solid var(--gold-deep);
    box-shadow:0 6px 14px rgba(0,0,0,.5);
    opacity:0;transition:opacity .18s, transform .18s;pointer-events:none;
  }
  .hotspot .label::after{
    content:"";position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);
    border:6px solid transparent;border-top-color:var(--parch-2);border-bottom:none;
  }
  .hotspot:hover .label,.hotspot:focus-visible .label{opacity:1;transform:translate(-50%,0)}

  .map-hint{
    font-size:.82rem;color:var(--parch-2);opacity:.7;letter-spacing:.05em;
    animation:dropIn 1.1s ease both;
  }
  .map-hint b{color:var(--gold);font-weight:600}

  /* ============ APP SHELL (interior pages) ============ */
  #shell{min-height:100vh;display:none;flex-direction:column}
  #shell.active{display:flex}
  .topbar{
    position:sticky;top:0;z-index:20;
    display:flex;align-items:center;gap:16px;
    padding:14px clamp(16px,4vw,40px);
    background:linear-gradient(180deg,#241B11,#1A140C);
    border-bottom:2px solid var(--wood-line);
    box-shadow:0 8px 20px -10px rgba(0,0,0,.8);
  }
  .back-btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:9px 16px;border-radius:8px;
    border:1.5px solid var(--wood-line);
    background:linear-gradient(180deg,#33271A,#241B11);
    color:var(--parch);font-family:"Cinzel",serif;font-size:.82rem;font-weight:500;
    transition:border-color .15s, transform .1s;
  }
  .back-btn:hover{border-color:var(--gold);transform:translateY(-1px)}
  .topbar .crest{font-size:1.1rem}
  .topbar h2{font-size:clamp(1rem,2.4vw,1.4rem);color:var(--gold-bright);font-weight:600}
  .topbar .spacer{flex:1}
  .nav-pills{display:flex;gap:6px;flex-wrap:wrap}
  .nav-pills a{
    padding:7px 13px;border-radius:7px;font-size:.78rem;font-family:"Cinzel",serif;
    color:var(--parch-2);border:1px solid transparent;transition:.15s;text-decoration:none;
  }
  .nav-pills a:hover{color:var(--parch);border-color:var(--wood-line)}
  .nav-pills a.on{background:rgba(217,167,54,.14);color:var(--gold-bright);border-color:var(--gold-deep)}

  .page{flex:1;width:100%;max-width:1080px;margin:0 auto;padding:clamp(20px,4vw,40px)}
  .page-head{margin-bottom:22px}
  .page-head .kicker{font-size:.72rem;letter-spacing:.36em;text-transform:uppercase;color:var(--gold);opacity:.85}
  .page-head h1{font-size:clamp(1.5rem,4vw,2.2rem);margin-top:6px;color:var(--parch)}
  .page-head p{color:var(--parch-2);opacity:.85;margin-top:6px;max-width:60ch}

  /* parchment card */
  .card{
    background:linear-gradient(170deg,var(--parch),var(--parch-2));
    color:var(--ink);border-radius:12px;
    border:2px solid var(--gold-deep);
    box-shadow:var(--shadow);
    position:relative;
  }
  .card::before{
    content:"";position:absolute;inset:6px;border:1px solid rgba(106,85,56,.35);
    border-radius:7px;pointer-events:none;
  }
  .card-pad{padding:clamp(16px,3vw,26px)}

  /* forms */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  label.fld{display:flex;flex-direction:column;gap:5px;font-size:.74rem;font-weight:600;
    letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft)}
  input,select,textarea{
    font-family:"Spectral",serif;font-size:.95rem;color:var(--ink);
    background:#FBF5E4;border:1.5px solid #B49A6B;border-radius:7px;padding:9px 11px;
    transition:border-color .15s, box-shadow .15s;width:100%;
  }
  textarea{resize:vertical;min-height:60px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-deep);
    box-shadow:0 0 0 3px rgba(217,167,54,.25)}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    padding:10px 18px;border-radius:8px;font-family:"Cinzel",serif;font-weight:600;
    font-size:.85rem;letter-spacing:.02em;transition:transform .1s, filter .15s;
  }
  .btn:hover{transform:translateY(-1px);filter:brightness(1.06)}
  .btn:active{transform:translateY(0)}
  .btn-gold{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#3a2a0a;
    box-shadow:0 4px 0 var(--gold-deep)}
  .btn-wood{background:linear-gradient(180deg,#3a2c1c,#2a2014);color:var(--parch);
    border:1.5px solid var(--wood-line)}
  .btn-ghost{background:transparent;border:1.5px solid #B49A6B;color:var(--ink)}
  .btn-sm{padding:6px 11px;font-size:.74rem;border-radius:6px}
  .btn-danger{color:var(--red);border:1.5px solid rgba(179,64,42,.5);background:rgba(179,64,42,.06)}
  .btn-danger:hover{background:rgba(179,64,42,.14)}

  .row-actions{display:flex;gap:8px;flex-wrap:wrap}

  /* lists */
  .stack{display:flex;flex-direction:column;gap:14px;margin-top:22px}
  .item{
    display:flex;gap:16px;align-items:flex-start;
    background:linear-gradient(170deg,#FBF5E4,#EFE3C4);
    border:1.5px solid #C9B27E;border-left:5px solid var(--gold);
    border-radius:10px;padding:14px 16px;color:var(--ink);
    box-shadow:0 6px 16px -10px rgba(0,0,0,.5);
  }
  .item .grow{flex:1;min-width:0}
  .item h3{font-size:1.05rem;color:var(--ink);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .item .meta{font-size:.85rem;color:var(--ink-soft);margin-top:4px}
  .item .meta b{color:var(--ink);font-weight:600}
  .item .notes{font-size:.88rem;margin-top:8px;font-style:italic;color:#5a4a32}

  .badge{font-family:"JetBrains Mono",monospace;font-size:.68rem;font-weight:700;
    padding:3px 8px;border-radius:5px;letter-spacing:.04em;white-space:nowrap}
  .voc-knight{background:#7a2b1e;color:#ffd9c9}
  .voc-paladin{background:#2c5a3a;color:#cdf3d8}
  .voc-sorcerer{background:#5a2c6a;color:#ecd2f7}
  .voc-druid{background:#2c4a6a;color:#cfe4f7}
  .voc-monk{background:#6a5a1e;color:#f7ecc2}
  .voc-none{background:#4a4032;color:#e7dbbe}

  .st-todo{background:#52473a;color:#e2d6bb}
  .st-doing{background:#7a5a1c;color:#ffe6a8}
  .st-done{background:#3a5a28;color:#d4f0bb}

  /* gold balance hero */
  .vault{
    display:flex;flex-wrap:wrap;gap:24px;align-items:center;justify-content:space-between;
  }
  .vault .total{font-family:"JetBrains Mono",monospace;font-weight:700;
    font-size:clamp(1.8rem,6vw,3rem);color:#3a2a0a;line-height:1}
  .vault .total small{font-size:.42em;color:var(--ink-soft);font-weight:700}
  .coins{display:flex;gap:14px;flex-wrap:wrap}
  .coin{display:flex;flex-direction:column;align-items:center;gap:3px;
    background:rgba(58,42,10,.06);border:1px solid #C9B27E;border-radius:9px;padding:10px 16px;min-width:84px}
  .coin .v{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:1.1rem;color:#3a2a0a}
  .coin .l{font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft)}
  .coin.cc .v{color:#7a2b6a}.coin.pp .v{color:#4a6a7a}.coin.gp .v{color:#a6791f}

  .ledger .amt{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:1rem}
  .amt.pos{color:var(--green-deep)} .amt.neg{color:var(--red)}

  /* overview stats */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
  .stat{background:linear-gradient(170deg,#FBF5E4,#EADCB8);border:1.5px solid #C9B27E;
    border-radius:11px;padding:18px 20px;color:var(--ink)}
  .stat .n{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:1.9rem;color:#3a2a0a;line-height:1}
  .stat .t{font-size:.78rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft);margin-top:8px}
  .stat .sub{font-size:.82rem;color:#5a4a32;margin-top:4px}

  .empty{text-align:center;color:#6a5538;padding:30px 16px;font-style:italic}

  /* Premium Account */
  .pa-status{display:inline-flex;align-items:center;gap:8px;padding:7px 15px;border-radius:8px;
    font-family:"Cinzel",serif;font-weight:600;font-size:.92rem}
  .pa-ok{background:#3a5a28;color:#d4f0bb}
  .pa-late{background:#7a2b1e;color:#ffd9c9}
  .pa-done{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#3a2a0a}
  .pa-soon{background:#52473a;color:#e2d6bb}
  .pa-bar{position:relative;height:26px;background:rgba(58,42,10,.12);border:1px solid #C9B27E;
    border-radius:8px;overflow:hidden;margin:18px 0 6px}
  .pa-fill{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold-bright));
    border-radius:8px 0 0 8px;transition:width .5s ease}
  .pa-marker{position:absolute;top:-5px;bottom:-5px;width:2px;background:var(--red)}
  .pa-marker::after{content:"hoje";position:absolute;top:-15px;left:50%;transform:translateX(-50%);
    font-size:.58rem;color:var(--red);font-family:"JetBrains Mono",monospace;white-space:nowrap}
  .pa-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:12px;margin-top:16px}
  .pa-metric{background:rgba(58,42,10,.06);border:1px solid #C9B27E;border-radius:9px;padding:12px 14px}
  .pa-metric .v{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:1.15rem;color:#3a2a0a}
  .pa-metric .l{font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-top:5px}
  .link-btn{display:inline-flex;align-items:center;gap:6px;color:var(--gold-deep);cursor:pointer;
    font-family:"Cinzel",serif;font-weight:600;font-size:.82rem;background:none;border:none;padding:0;
    border-bottom:1px solid transparent}
  .link-btn:hover{border-bottom-color:var(--gold-deep)}

  /* hub de imagem dentro de uma página (ex.: Gold) */
  .hub-frame{position:relative;width:100%;max-width:980px;margin:6px auto 0;aspect-ratio:1443/720;
    border:3px solid var(--wood-line);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
  .hub-frame img{width:100%;height:100%;display:block;object-fit:cover;user-select:none}
  .hub-frame::after{content:"";position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 90px 8px rgba(0,0,0,.4)}
  .hub-hint{text-align:center;font-size:.82rem;color:var(--parch-2);opacity:.7;margin-top:12px}
  .hub-hint b{color:var(--gold)}

  /* barras de evolução do personagem */
  .skbar{margin-top:9px}
  .skbar .row{display:flex;justify-content:space-between;gap:10px;font-size:.76rem;color:var(--ink-soft);margin-bottom:3px}
  .skbar .row b{color:var(--ink);font-family:"JetBrains Mono",monospace}
  .skbar .track{height:9px;background:rgba(58,42,10,.14);border:1px solid #C9B27E;border-radius:6px;overflow:hidden}
  .skbar .fill{height:100%;border-radius:6px;transition:width .4s}
  .fill-lvl{background:linear-gradient(90deg,var(--gold-deep),var(--gold-bright))}
  .fill-sword{background:linear-gradient(90deg,#7a2b1e,#c2533a)}
  .fill-def{background:linear-gradient(90deg,#2c5a3a,#4c8a5a)}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
  .seg{display:flex;gap:4px;background:rgba(58,42,10,.08);padding:4px;border-radius:8px}
  .seg button{padding:6px 12px;border-radius:6px;font-size:.78rem;font-family:"Cinzel",serif;color:var(--ink-soft)}
  .seg button.on{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#3a2a0a}

  /* animations */
  @keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}
    50%{transform:translate(-50%,-50%) scale(1.35);opacity:.65}}
  @keyframes dropIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
  @keyframes frameIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
  @media (max-width:560px){
    .nav-pills{display:none}
    .map-title h1{font-size:1.25rem}
    .item{flex-direction:column}
  }
</style>
</head>

<script>
/* ============================================================
   Camada de dados — usa localStorage, com fallback em memória
   (para que o preview não quebre caso o storage esteja bloqueado)
============================================================ */
const MEM = {};
const store = {
  read(key, def){
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
    catch(e){ return (key in MEM) ? MEM[key] : def; }
  },
  write(key, val){
    MEM[key] = val;
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){}
  }
};
const K = { chars:'tibia.chars', gold:'tibia.gold', obj:'tibia.obj', pa:'tibia.pa', goals:'tibia.goals' };
const uid = () => Math.random().toString(36).slice(2,9);
const nf = n => Number(n||0).toLocaleString('pt-BR');

const VOCS = {
  knight:'Knight', paladin:'Paladin', sorcerer:'Sorcerer', druid:'Druid', monk:'Monk', none:'—'
};
const VOC_TAG = { knight:'EK', paladin:'RP', sorcerer:'MS', druid:'ED', monk:'EM', none:'—' };

let editingChar = null, editingObj = null;

/* ===================== Estado helpers ===================== */
const getChars = () => store.read(K.chars, []);
const getGold  = () => store.read(K.gold, []);   // [{id,ts,amount(gp signed),note,charId}]
const getObj   = () => store.read(K.obj, []);
const goldBalance = () => getGold().reduce((s,t)=>s+Number(t.amount||0),0);
const charName = id => (getChars().find(c=>c.id===id)||{}).name || '';

/* ============================================================
   Roteamento por hash
============================================================ */
const ROUTES = ['overview','characters','gold','wallet','premium','goals','objectives'];
const TITLES = { overview:['⚑','Visão geral'], characters:['⚔','Personagens'],
                 gold:['💰','Tesouro'], wallet:['🪙','Cofre & Movimentações'], premium:['👑','Premium Account'], goals:['🎯','Metas de Gold'], objectives:['🐉','Objetivos'] };

function go(dest){
  if(dest==='map'){ location.hash=''; return; }
  location.hash = dest;
}
function router(){
  const hash = location.hash.replace('#','');
  const mapView = document.getElementById('view-map');
  const shell = document.getElementById('shell');
  if(!ROUTES.includes(hash)){
    shell.classList.remove('active'); mapView.style.display='flex';
    return;
  }
  mapView.style.display='none'; shell.classList.add('active');
  const [crest,title] = TITLES[hash];
  document.getElementById('shell-crest').textContent = crest;
  document.getElementById('shell-title').textContent = title;
  document.querySelectorAll('[data-pill]').forEach(a=>a.classList.toggle('on', a.dataset.pill===hash));
  editingChar=null; editingObj=null;
  RENDER[hash]();
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', router);

  const t = e.target.closest('[data-go]');
  if(t){ go(t.dataset.go); }
});

/* barras de evolução (Tibia mostra "quanto falta"; aqui convertemos pra "quanto já fez") */
function pctDone(remaining){
  if(remaining===undefined||remaining===null||remaining==='') return null;
  const r=Math.max(0,Math.min(100,Number(remaining)));
  return Math.round(100-r);
}
function evoBar(label, value, remaining, cls){
  const done=pctDone(remaining);
  const right = done===null ? 'sem %' : `${done}% feito · faltam ${100-done}%`;
  const w = done===null ? 0 : done;
  const val = (value!==undefined && value!==null && value!=='') ? ` <b>${value}</b>` : '';
  return `<div class="skbar"><div class="row"><span>${label}${val}</span><span>${right}</span></div>
    <div class="track"><div class="fill ${cls}" style="width:${w}%"></div></div></div>`;
}
function charBars(c){
  let out = evoBar('Level', c.level||0, c.levelPct, 'fill-lvl');
  if(c.sword!==undefined && c.sword!=='') out += evoBar('Sword', c.sword, c.swordPct, 'fill-sword');
  if(c.def!==undefined && c.def!=='') out += evoBar('Defesa', c.def, c.defPct, 'fill-def');
  return `<div style="margin-top:10px">${out}</div>`;
}

function saveChar(){
  const name=document.getElementById('c-name').value.trim();
  if(!name){ document.getElementById('c-name').focus(); return; }
  const numOrUndef=id=>{ const v=document.getElementById(id).value.trim(); return v===''?undefined:Math.max(0,parseInt(v)||0); };
  const pctOrUndef=id=>{ const v=document.getElementById(id).value.trim(); return v===''?undefined:Math.max(0,Math.min(100,parseInt(v)||0)); };
  const data={ name,
    voc:document.getElementById('c-voc').value,
    level:Math.max(1,parseInt(document.getElementById('c-level').value)||1),
    world:document.getElementById('c-world').value.trim(),
    levelPct:pctOrUndef('c-levelpct'),
    sword:numOrUndef('c-sword'), swordPct:pctOrUndef('c-swordpct'),
    def:numOrUndef('c-def'), defPct:pctOrUndef('c-defpct'),
    notes:document.getElementById('c-notes').value.trim() };
  const list=getChars();
  if(editingChar){ Object.assign(editingChar,data); }
  else { list.push({id:uid(),...data}); }
  store.write(K.chars, editingChar?list:list);
  editingChar=null; RENDER.characters();
}
function startEditChar(id){ editingChar=getChars().find(c=>c.id===id); RENDER.characters(); }
function levelChar(id,d){ const l=getChars(); const c=l.find(x=>x.id===id); if(c){c.level=(c.level||0)+d; store.write(K.chars,l); RENDER.characters();} }
function delChar(id){ if(!confirm('Excluir este personagem?'))return; store.write(K.chars,getChars().filter(c=>c.id!==id)); RENDER.characters(); }

function addGold(sign){
  const raw=parseInt(document.getElementById('g-amt').value)||0;
  if(raw<=0){ document.getElementById('g-amt').focus(); return; }
  const unit=parseInt(document.getElementById('g-unit').value);
  const amount=sign*raw*unit;
  const list=getGold();
  list.push({id:uid(),ts:Date.now(),amount,
    note:document.getElementById('g-note').value.trim(),
    charId:document.getElementById('g-char').value});
  store.write(K.gold,list); RENDER.wallet();
}
function delGold(id){ store.write(K.gold,getGold().filter(t=>t.id!==id)); RENDER.wallet(); }

function saveObj(){
  const title=document.getElementById('o-title').value.trim();
  if(!title){ document.getElementById('o-title').focus(); return; }
  const data={ title,
    charId:document.getElementById('o-char').value,
    status:document.getElementById('o-status').value,
    desc:document.getElementById('o-desc').value.trim() };
  const list=getObj();
  if(editingObj){ Object.assign(editingObj,data); }
  else { list.push({id:uid(),ts:Date.now(),...data}); }
  store.write(K.obj,list); editingObj=null; RENDER.objectives();
}
function startEditObj(id){ editingObj=getObj().find(o=>o.id===id); RENDER.objectives(); }
function cycleObj(id){ const l=getObj(); const o=l.find(x=>x.id===id);
  const nx={todo:'doing',doing:'done',done:'todo'}; o.status=nx[o.status]; store.write(K.obj,l); RENDER.objectives(); }
function delObj(id){ if(!confirm('Excluir este objetivo?'))return; store.write(K.obj,getObj().filter(o=>o.id!==id)); RENDER.objectives(); }

/* ============================================================
   PREMIUM ACCOUNT — meta mensal de gold
============================================================ */
const PA_DEF = { config:{tc:250,perTc:40000,days:30}, cycle:null, history:[] };
function getPA(){
  const p = store.read(K.pa, JSON.parse(JSON.stringify(PA_DEF)));
  if(!p.config) p.config={tc:250,perTc:40000,days:30};
  if(!('cycle' in p)) p.cycle=null;
  if(!p.history) p.history=[];
  return p;
}
function savePA(p){ store.write(K.pa,p); }
function todayISO(){ const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10); }
function paGoal(cfg){ return (Number(cfg.tc)||0)*(Number(cfg.perTc)||0); }
function fmtGold(n){
  n=Number(n||0); const s=n<0?'-':''; n=Math.abs(n);
  const t=x=>x.toLocaleString('pt-BR',{maximumFractionDigits:2});
  if(n>=1000000) return s+t(n/1000000)+'kk';
  if(n>=1000) return s+t(n/1000)+'k';
  return s+t(n);
}
function paStats(){
  const p=getPA(), cfg=p.config, c=p.cycle;
  const goal=paGoal(cfg), days=Math.max(1,Number(cfg.days)||30), daily=goal/days;
  if(!c) return { p,cfg,c:null,goal,days,daily,saved:0,pctSaved:0,status:'soon' };
  const saved=(c.entries||[]).reduce((s,e)=>s+Number(e.amount||0),0);
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date(c.start+'T00:00:00'); start.setHours(0,0,0,0);
  const diff=Math.floor((today-start)/86400000);
  const dayNum=diff+1;                 // dia do início = Dia 1
  const started=today>=start;
  const expected=Math.min(goal, daily*Math.max(0,Math.min(dayNum,days)));
  const remaining=Math.max(0,goal-saved);
  const daysLeft=Math.max(0, days-dayNum+1);
  const neededPerDay= daysLeft>0 ? remaining/daysLeft : remaining;
  const behind=Math.max(0,expected-saved);
  let status;
  if(!started) status='soon';
  else if(saved>=goal) status='done';
  else if(saved>=expected-1) status='ok';
  else status='late';
  return { p,cfg,c,goal,days,daily,saved,dayNum,started,expected,remaining,daysLeft,neededPerDay,behind,status,
           pctSaved:Math.min(100, goal?saved/goal*100:0), pctExpected:Math.min(100, goal?expected/goal*100:0) };
}

          <label class="fld">Data de início<input id="pa-start" type="date" value="${todayISO()}"></label>
        </div>
        <p style="color:var(--ink-soft);font-size:.85rem;margin-top:10px">Meta: <b>${fmtGold(paGoal(cfg))}</b> · alvo diário: <b>${fmtGold(paGoal(cfg)/Math.max(1,cfg.days))}</b></p>
        <div class="row-actions" style="margin-top:14px"><button class="btn btn-gold" onclick="paStart()">Começar ciclo</button></div>
      </div>`;
    return;
  }
  const stLbl={ok:['pa-ok','✅ Em dia'],late:['pa-late','⚠ Atrasado'],done:['pa-done','🏆 Meta concluída!'],soon:['pa-soon','🕓 Ainda não começou']}[s.status];
  const entries=(s.c.entries||[]).slice().sort((a,b)=> a.date<b.date?1:-1);
  page().innerHTML = `
    <div class="page-head"><div class="kicker">Câmara do Tesouro</div>
      <h1>👑 Premium Account</h1>
      <p>Início em ${new Date(s.c.start+'T00:00:00').toLocaleDateString('pt-BR')} · Dia ${Math.min(Math.max(s.dayNum,1),s.days)} de ${s.days}</p>
      <button class="link-btn" style="margin-top:8px" onclick="go('gold')">← Voltar pro Tesouro</button></div>

    <div class="card card-pad" style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <span class="pa-status ${stLbl[0]}">${stLbl[1]}</span>
        <span class="mono" style="color:#3a2a0a;font-weight:700;font-size:1.15rem">${fmtGold(s.saved)} / ${fmtGold(s.goal)}</span>
      </div>
      <div class="pa-bar">
        <div class="pa-fill" style="width:${s.pctSaved}%"></div>
        ${s.started && s.status!=='done'?`<div class="pa-marker" style="left:${s.pctExpected}%"></div>`:''}
      </div>
      <div style="font-size:.8rem;color:var(--ink-soft)">${Math.round(s.pctSaved)}% guardado${s.started&&s.status!=='done'?` · meta de hoje: ${fmtGold(s.expected)}`:''}</div>

      <div class="pa-metrics">
        <div class="pa-metric"><div class="v">${fmtGold(s.remaining)}</div><div class="l">Falta guardar</div></div>
        <div class="pa-metric"><div class="v">${s.daysLeft}</div><div class="l">Dias restantes</div></div>
        <div class="pa-metric"><div class="v">${fmtGold(s.neededPerDay)}</div><div class="l">Ritmo p/ fechar</div></div>
        ${s.status==='late'?`<div class="pa-metric"><div class="v" style="color:var(--red)">${fmtGold(s.behind)}</div><div class="l">Atraso atual</div></div>`:''}
      </div>
      ${s.status==='late'?`<p style="margin-top:14px;color:var(--red);font-size:.9rem">Você está <b>${fmtGold(s.behind)}</b> atrás do ritmo. Guarde <b>${fmtGold(s.neededPerDay)}/dia</b> nos próximos ${s.daysLeft} dias pra fechar no prazo.</p>`:''}
      ${s.status==='ok'?`<p style="margin-top:14px;color:var(--green-deep);font-size:.9rem">Mandando bem! Mantenha ~${fmtGold(s.daily)}/dia e você fecha os ${fmtGold(s.goal)} no prazo.</p>`:''}
      ${s.status==='done'?`<p style="margin-top:14px;color:var(--gold-deep);font-size:.9rem">🎉 Você já juntou o suficiente pra Premium Account deste ciclo!</p>`:''}
    </div>

    <div class="card card-pad" style="margin-bottom:18px">
      <h3 style="font-family:Cinzel;color:#3a2a0a;margin-bottom:10px">Registrar gold do dia</h3>
      <div class="form-grid">
        <label class="fld">Data<input id="pa-edate" type="date" value="${todayISO()}"></label>
        <label class="fld">Gold guardado<input id="pa-eamt" type="number" min="0" placeholder="ex.: 350000"></label>
      </div>
      <div class="row-actions" style="margin-top:14px"><button class="btn btn-gold" onclick="paAddEntry()">Registrar</button></div>
    </div>

    <div class="stack">
      ${entries.length===0?`<div class="card card-pad empty">Nenhum registro ainda. Anote o gold que guardar hoje!</div>`:''}
      ${entries.map(e=>`<div class="item" style="border-left-color:var(--gold)">
        <div class="grow"><h3 class="mono">${fmtGold(e.amount)} <span style="font-size:.7rem;color:var(--ink-soft)">(${nf(e.amount)} gp)</span></h3>
          <div class="meta">${new Date(e.date+'T00:00:00').toLocaleDateString('pt-BR')}</div></div>
        <button class="btn btn-danger btn-sm" onclick="paDelEntry('${e.id}')">Remover</button>
      </div>`).join('')}
    </div>

    <div class="card card-pad" style="margin-top:18px">
      <h3 style="font-family:Cinzel;color:#3a2a0a;margin-bottom:10px">Configuração da meta</h3>
      <div class="form-grid">
        <label class="fld">Tibia Coins<input id="pa-tc" type="number" min="0" value="${cfg.tc}"></label>
        <label class="fld">Gold por TC<input id="pa-pertc" type="number" min="0" value="${cfg.perTc}"></label>
        <label class="fld">Dias do ciclo<input id="pa-days" type="number" min="1" value="${cfg.days}"></label>
      </div>
      <p style="color:var(--ink-soft);font-size:.85rem;margin-top:10px">Meta atual: <b>${fmtGold(s.goal)}</b> · alvo diário: <b>${fmtGold(s.daily)}</b></p>
      <div class="row-actions" style="margin-top:14px">
        <button class="btn btn-wood" onclick="paSaveConfig()">Salvar configuração</button>
        <button class="btn btn-ghost" onclick="paNewCycle()">Iniciar novo mês</button>
      </div>
    </div>
    ${(s.p.history&&s.p.history.length)?`<div class="card card-pad" style="margin-top:18px">
      <h3 style="font-family:Cinzel;color:#3a2a0a;margin-bottom:10px">Ciclos anteriores</h3>
      ${s.p.history.slice().reverse().map(h=>`<div class="item"><div class="grow">
        <h3 class="mono">${fmtGold(h.saved)} / ${fmtGold(h.goal)}</h3>
        <div class="meta">${new Date(h.start+'T00:00:00').toLocaleDateString('pt-BR')} · ${h.met?'✅ meta batida':'não concluído'}</div>
      </div></div>`).join('')}
    </div>`:''}`;
};
function paStart(){
  const p=getPA();
  p.config={ tc:Math.max(0,parseInt(document.getElementById('pa-tc').value)||0),
    perTc:Math.max(0,parseInt(document.getElementById('pa-pertc').value)||0),
    days:Math.max(1,parseInt(document.getElementById('pa-days').value)||30) };
  p.cycle={ start:document.getElementById('pa-start').value||todayISO(), entries:[] };
  savePA(p); RENDER.premium();
}
function paAddEntry(){
  const amt=parseInt(document.getElementById('pa-eamt').value)||0;
  if(amt<=0){ document.getElementById('pa-eamt').focus(); return; }
  const date=document.getElementById('pa-edate').value||todayISO();
  const p=getPA(); p.cycle.entries.push({id:uid(),date,amount:amt}); savePA(p); RENDER.premium();
}
function paDelEntry(id){ const p=getPA(); p.cycle.entries=p.cycle.entries.filter(e=>e.id!==id); savePA(p); RENDER.premium(); }
function paSaveConfig(){
  const p=getPA();
  p.config={ tc:Math.max(0,parseInt(document.getElementById('pa-tc').value)||0),
    perTc:Math.max(0,parseInt(document.getElementById('pa-pertc').value)||0),
    days:Math.max(1,parseInt(document.getElementById('pa-days').value)||30) };
  savePA(p); RENDER.premium();
}
function paNewCycle(){
  if(!confirm('Arquivar o ciclo atual e começar um novo mês? O progresso atual vai para o histórico.'))return;
  const p=getPA(), s=paStats();
  if(p.cycle){ p.history.push({ start:p.cycle.start, goal:s.goal, saved:s.saved, met:s.saved>=s.goal }); }
  p.cycle={ start:todayISO(), entries:[] };
  savePA(p); RENDER.premium();
}

/* ============================================================
   METAS DE GOLD — objetivos pontuais com prazo (ex.: char novo)
============================================================ */
function getGoals(){ return store.read(K.goals, []); }
function saveGoals(g){ store.write(K.goals, g); }
function goalGoldOf(g){ return (Number(g.tc)||0)*(Number(g.perTc)||0); }
function goalStats(g){
  const goal=goalGoldOf(g);
  const saved=(g.entries||[]).reduce((s,e)=>s+Number(e.amount||0),0);
  const today=new Date(); today.setHours(0,0,0,0);
  const start=new Date((g.start||g.deadline)+'T00:00:00'); start.setHours(0,0,0,0);
  const end=new Date(g.deadline+'T00:00:00'); end.setHours(0,0,0,0);
  const oneDay=86400000;
  const totalDays=Math.max(1, Math.round((end-start)/oneDay)+1);
  const daysElapsed=Math.max(0, Math.floor((today-start)/oneDay)+1);
  const daysRemaining=Math.max(0, Math.round((end-today)/oneDay)+1);
  const overallDaily=goal/totalDays;
  const expected=Math.min(goal, overallDaily*Math.min(daysElapsed,totalDays));
  const remaining=Math.max(0,goal-saved);
  const neededPerDay= daysRemaining>0 ? remaining/daysRemaining : remaining;
  const behind=Math.max(0,expected-saved);
  const started=today>=start, ended=today>end;
  let status;
  if(saved>=goal) status='done';
  else if(ended) status='ended';
  else if(!started) status='soon';
  else if(saved>=expected-1) status='ok';
  else status='late';
  return {goal,saved,start,end,totalDays,daysElapsed,daysRemaining,overallDaily,expected,remaining,neededPerDay,behind,started,ended,status,
    pctSaved:Math.min(100,goal?saved/goal*100:0), pctExpected:Math.min(100,goal?expected/goal*100:0)};
}

RENDER.goals = function(){
  const goals=getGoals();
  const yearEnd=`${new Date().getFullYear()}-12-31`;
  page().innerHTML = `
    <div class="page-head"><div class="kicker">Câmara do Tesouro</div>
      <h1>🎯 Metas de Gold</h1>
      <p>Objetivos com prazo (ex.: juntar gold pra um char novo). O ritmo necessário recalcula sozinho a cada dia.</p>
      <button class="link-btn" style="margin-top:8px" onclick="go('gold')">← Voltar pro Tesouro</button></div>

    <div class="card card-pad" style="margin-bottom:18px">
      <h3 style="font-family:Cinzel;color:#3a2a0a;margin-bottom:12px">Nova meta</h3>
      <div class="form-grid">
        <label class="fld" style="grid-column:1/-1">Nome<input id="ng-name" placeholder="Ex.: Char novo"></label>
        <label class="fld">Tibia Coins<input id="ng-tc" type="number" min="0" value="1000"></label>
        <label class="fld">Gold por TC<input id="ng-pertc" type="number" min="0" value="40000"></label>
        <label class="fld">Prazo final<input id="ng-deadline" type="date" value="${yearEnd}"></label>
      </div>
      <div class="row-actions" style="margin-top:14px"><button class="btn btn-gold" onclick="goalAdd()">Criar meta</button></div>
    </div>

    ${goals.length===0?`<div class="card card-pad empty">Nenhuma meta ainda. Crie a primeira acima — que tal o char novo? 😎</div>`:''}

    <div class="stack">
      ${goals.slice().map(g=>{
        const s=goalStats(g);
        const stLbl={ok:['pa-ok','✅ Em dia'],late:['pa-late','⚠ Atrasado'],done:['pa-done','🏆 Concluída!'],soon:['pa-soon','🕓 A começar'],ended:['pa-late','⌛ Prazo encerrado']}[s.status];
        const entries=(g.entries||[]).slice().sort((a,b)=> a.date<b.date?1:-1);
        return `<div class="card card-pad">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">
            <div><h2 style="font-family:Cinzel;color:#3a2a0a;font-size:1.25rem">${esc(g.name)}</h2>
              <div style="font-size:.82rem;color:var(--ink-soft);margin-top:2px">Prazo: ${new Date(g.deadline+'T00:00:00').toLocaleDateString('pt-BR')} · ${s.daysRemaining} dia(s) restante(s)</div></div>
            <span class="pa-status ${stLbl[0]}">${stLbl[1]}</span>
          </div>
          <div class="pa-bar">
            <div class="pa-fill" style="width:${s.pctSaved}%"></div>
            ${s.started && s.status!=='done' && s.status!=='ended'?`<div class="pa-marker" style="left:${s.pctExpected}%"></div>`:''}
          </div>
          <div style="font-size:.8rem;color:var(--ink-soft)">${fmtGold(s.saved)} / ${fmtGold(s.goal)} · ${Math.round(s.pctSaved)}%${s.started&&s.status!=='done'&&s.status!=='ended'?` · meta de hoje: ${fmtGold(s.expected)}`:''}</div>

          <div class="pa-metrics">
            <div class="pa-metric"><div class="v">${fmtGold(s.remaining)}</div><div class="l">Falta guardar</div></div>
            <div class="pa-metric"><div class="v">${s.daysRemaining}</div><div class="l">Dias até o prazo</div></div>
            <div class="pa-metric"><div class="v">${fmtGold(s.neededPerDay)}</div><div class="l">Ritmo p/ fechar</div></div>
            ${s.status==='late'?`<div class="pa-metric"><div class="v" style="color:var(--red)">${fmtGold(s.behind)}</div><div class="l">Atraso atual</div></div>`:''}
          </div>
          ${s.status==='late'?`<p style="margin-top:12px;color:var(--red);font-size:.88rem">Atrasado em <b>${fmtGold(s.behind)}</b>. Pra fechar no prazo, guarde <b>${fmtGold(s.neededPerDay)}/dia</b> nos próximos ${s.daysRemaining} dias.</p>`:''}
          ${s.status==='ok'?`<p style="margin-top:12px;color:var(--green-deep);font-size:.88rem">No ritmo! Continue guardando ~${fmtGold(s.neededPerDay)}/dia e você fecha no prazo.</p>`:''}
          ${s.status==='ended'?`<p style="margin-top:12px;color:var(--red);font-size:.88rem">O prazo passou e faltaram ${fmtGold(s.remaining)}. Você pode editar o prazo ou seguir guardando.</p>`:''}
          ${s.status==='done'?`<p style="margin-top:12px;color:var(--gold-deep);font-size:.88rem">🎉 Meta atingida! Pode comprar.</p>`:''}

          <div style="margin-top:16px;padding-top:16px;border-top:1px dashed #C9B27E">
            <div class="form-grid">
              <label class="fld">Data<input id="ge-date-${g.id}" type="date" value="${todayISO()}"></label>
              <label class="fld">Gold guardado<input id="ge-amt-${g.id}" type="number" min="0" placeholder="ex.: 200000"></label>
            </div>
            <div class="row-actions" style="margin-top:12px">
              <button class="btn btn-gold btn-sm" onclick="goalAddEntry('${g.id}')">Registrar gold</button>
              <button class="btn btn-danger btn-sm" onclick="goalDelete('${g.id}')">Excluir meta</button>
            </div>
            ${entries.length?`<div style="margin-top:14px;display:flex;flex-direction:column;gap:8px">
              ${entries.map(e=>`<div style="display:flex;justify-content:space-between;align-items:center;font-size:.88rem;color:var(--ink)">
                <span class="mono"><b>${fmtGold(e.amount)}</b> <span style="color:var(--ink-soft)">· ${new Date(e.date+'T00:00:00').toLocaleDateString('pt-BR')}</span></span>
                <button class="btn btn-danger btn-sm" onclick="goalDelEntry('${g.id}','${e.id}')">remover</button>
              </div>`).join('')}
            </div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
};
function goalAdd(){
  const name=document.getElementById('ng-name').value.trim();
  if(!name){ document.getElementById('ng-name').focus(); return; }
  const g={ id:uid(), name,
    tc:Math.max(0,parseInt(document.getElementById('ng-tc').value)||0),
    perTc:Math.max(0,parseInt(document.getElementById('ng-pertc').value)||0),
    deadline:document.getElementById('ng-deadline').value||`${new Date().getFullYear()}-12-31`,
    start:todayISO(), entries:[] };
  const list=getGoals(); list.push(g); saveGoals(list); RENDER.goals();
}
function goalDelete(id){ if(!confirm('Excluir esta meta e seus registros?'))return; saveGoals(getGoals().filter(g=>g.id!==id)); RENDER.goals(); }
function goalAddEntry(id){
  const amt=parseInt(document.getElementById('ge-amt-'+id).value)||0;
  if(amt<=0){ document.getElementById('ge-amt-'+id).focus(); return; }
  const date=document.getElementById('ge-date-'+id).value||todayISO();
  const list=getGoals(); const g=list.find(x=>x.id===id);
  if(g){ (g.entries=g.entries||[]).push({id:uid(),date,amount:amt}); saveGoals(list); RENDER.goals(); }
}
function goalDelEntry(gid,eid){ const list=getGoals(); const g=list.find(x=>x.id===gid);
  if(g){ g.entries=(g.entries||[]).filter(e=>e.id!==eid); saveGoals(list); RENDER.goals(); } }

/* iniciar */
router();
</script>
